<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finanças • Vinicius</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #0F0F14;
    --bg-card: #1A1A24;
    --bg-elevated: #252533;
    --bg-hover: #2D2D3F;
    --border: #2D2D3F;
    --text: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --accent: #60A5FA;
    --success: #34D399;
    --warning: #FBBF24;
    --danger: #F87171;
    --purple: #A78BFA;
    --pink: #F472B6;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .icon-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--accent);
    color: #0F172A;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .content::-webkit-scrollbar {
    width: 8px;
  }
  .content::-webkit-scrollbar-track { background: var(--bg); }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.2s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SELETOR MÊS/ANO */
  .period-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }

  .period-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .period-btn:hover { background: var(--bg-hover); }

  .period-display {
    font-size: 14px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  @media (min-width: 768px) {
    .cards-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
  }

  .card.success::before { background: var(--success); }
  .card.warning::before { background: var(--warning); }
  .card.danger::before { background: var(--danger); }
  .card.purple::before { background: var(--purple); }
  .card.pink::before { background: var(--pink); }

  .card-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-value {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .card.success .card-value { color: var(--success); }
  .card.warning .card-value { color: var(--warning); }
  .card.danger .card-value { color: var(--danger); }
  .card.purple .card-value { color: var(--purple); }
  .card.pink .card-value { color: var(--pink); }

  /* SECTION */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title .accent { color: var(--accent); }

  /* TABELA */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .table th {
    text-align: left;
    padding: 10px 8px;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  .table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .table tr:hover td {
    background: var(--bg-hover);
  }

  .table .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* CATEGORIA TAGS */
  .tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .tag-success { background: rgba(52, 211, 153, 0.15); color: var(--success); }
  .tag-danger { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
  .tag-warning { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
  .tag-accent { background: rgba(96, 165, 250, 0.15); color: var(--accent); }
  .tag-purple { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
  .tag-pink { background: rgba(244, 114, 182, 0.15); color: var(--pink); }
  .tag-muted { background: rgba(100, 116, 139, 0.2); color: var(--text-secondary); }

  /* FAB - Botão flutuante */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #0F172A;
    border: none;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(96, 165, 250, 0.4);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }

  .fab:hover { transform: scale(1.05); }
  .fab:active { transform: scale(0.95); }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  @media (min-width: 768px) {
    .modal-backdrop { align-items: center; }
  }

  .modal-backdrop.show { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    animation: slideUp 0.2s;
  }

  @media (min-width: 768px) {
    .modal { border-radius: var(--radius); }
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  /* FORM */
  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-textarea {
    resize: vertical;
    min-height: 60px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* BUTTONS */
  .btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0F172A;
  }
  .btn-primary:hover { opacity: 0.9; }

  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg-hover); }

  .btn-danger {
    background: rgba(248, 113, 113, 0.15);
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* CATEGORIAS BAR */
  .cat-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .cat-bar-label {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }

  .cat-bar-value {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 13px;
  }

  .cat-bar-progress {
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    z-index: 200;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    animation: toastIn 0.3s;
  }

  @keyframes toastIn {
    from { transform: translate(-50%, 20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* LIST ITEM */
  .list-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .list-item:hover {
    border-color: var(--accent);
    background: var(--bg-hover);
  }

  .list-item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .list-item-title {
    font-weight: 600;
    font-size: 14px;
  }

  .list-item-value {
    font-weight: 700;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }

  .list-item-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  /* DOT separator */
  .dot {
    width: 3px;
    height: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    display: inline-block;
  }

  /* HEADER bottom row de import/export */
  .header-actions {
    display: flex;
    gap: 8px;
  }

  /* SCROLL hint para tabela em mobile */
  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -16px;
    padding: 0 16px;
  }

  /* PROGRESS RING (meta) */
  .progress-ring {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px 0;
  }

  .progress-ring-svg {
    transform: rotate(-90deg);
  }

  .progress-ring-circle {
    fill: none;
    stroke: var(--bg-elevated);
    stroke-width: 8;
  }

  .progress-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s;
  }

  /* CHARTS */
  .chart-container {
    height: 240px;
    margin: 16px -8px 0;
    position: relative;
  }

  .chart-bar {
    transition: opacity 0.2s;
    cursor: pointer;
  }

  .chart-bar:hover { opacity: 0.8; }

  .chart-label {
    font-size: 10px;
    fill: var(--text-muted);
  }

  .chart-grid {
    stroke: var(--border);
    stroke-dasharray: 2 4;
  }

  /* BADGE */
  .badge {
    display: inline-block;
    background: var(--danger);
    color: white;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 4px;
  }

  /* SWITCH */
  .switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    transition: 0.2s;
    border-radius: 24px;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 2px;
    bottom: 2px;
    background: var(--text);
    transition: 0.2s;
    border-radius: 50%;
  }

  input:checked + .slider {
    background: var(--accent);
  }

  input:checked + .slider:before {
    transform: translateX(20px);
    background: #0F172A;
  }

  /* SAFE AREA pra iPhone */
  @supports(padding: max(0px)) {
    .header { padding-top: max(16px, env(safe-area-inset-top)); }
    .fab { bottom: max(24px, env(safe-area-inset-bottom)); }
    .content { padding-bottom: max(80px, env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" style="display:flex;position:fixed;inset:0;z-index:1000;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:20px">
  <div style="font-size:48px;margin-bottom:8px">🔐</div>
  <div id="lockTitle" style="font-size:22px;font-weight:700;margin-bottom:4px">Bem-vindo</div>

  <div id="pinDisplay" style="font-size:32px;letter-spacing:12px;margin-bottom:8px;height:48px;font-weight:700;color:var(--accent);min-width:200px;text-align:center"></div>
  
  <div id="lockError" style="font-size:13px;color:var(--danger);height:18px;margin-bottom:16px"></div>
  
  <div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-bottom:16px">

    <button class="pin-btn" data-key="2">2</button>
    <button class="pin-btn" data-key="3">3</button>
    <button class="pin-btn" data-key="4">4</button>
    <button class="pin-btn" data-key="5">5</button>
    <button class="pin-btn" data-key="6">6</button>
    <button class="pin-btn" data-key="7">7</button>

    <button class="pin-btn" data-key="9">9</button>

    <button class="pin-btn" data-key="0">0</button>
    <button class="pin-btn pin-btn-action" data-key="ok">✓</button>

  <button id="lockImportBtn" style="background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;text-decoration:underline;margin-top:8px;display:none">Importar dados de backup</button>
</div>

<style>
  .pin-btn {

  .pin-btn[data-key="ok"]:active {

  /* Animação de erro */
  @keyframes shake {

  .shake {

<script>

// HELPERS
// ============================================================
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return 'R$ 0,00';
  return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function fmtDate(d) {
  if (!d) return '-';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function parseDate(s) {
  if (!s) return null;
  return new Date(s + 'T00:00:00');
}

let CURRENT_PERIOD = (() => {
  const now = new Date();
  return { month: now.getMonth() + 1, year: now.getFullYear() };
})();

// ============================================================
// CÁLCULOS
// ============================================================
function calcSaldoAtual() {
  const corte = parseDate(DATA.config.dataCorte);
  let saldo = DATA.config.saldoInicial;
  
  // Receitas com dataReceb >= corte
  DATA.receitas.forEach(r => {
    if (r.dataReceb && r.valor) {
      const d = parseDate(r.dataReceb);
      if (d >= corte) saldo += r.valor;
    }
  });
  
  // Despesas com dataPgto >= corte
  DATA.despesas.forEach(d => {
    if (d.dataPgto && d.valor) {
      const dt = parseDate(d.dataPgto);
      if (dt >= corte) saldo -= d.valor;
    }
  });
  
  // Empréstimos PRÓPRIOS pagos (capital volta) com dataPgto >= corte
  DATA.emprestimos.forEach(e => {
    if (e.origem === 'Próprio' && e.dataPgto) {
      const d = parseDate(e.dataPgto);
      if (d >= corte) saldo += e.valor;
    }
  });
  
  // Empréstimos PRÓPRIOS novos (capital saiu) com dataEmp > corte
  DATA.emprestimos.forEach(e => {
    if (e.origem === 'Próprio' && e.dataEmp) {
      const d = parseDate(e.dataEmp);
      if (d > corte) saldo -= e.valor;
    }
  });
  
  // Empréstimos de TERCEIRO pagos: capital ENTRA na conta (até ser devolvido)
  DATA.emprestimos.forEach(e => {
    if (e.origem === 'Terceiro' && e.dataPgto) {
      const d = parseDate(e.dataPgto);
      if (d >= corte) saldo += e.valor;
    }
  });
  
  // Devoluções pra terceiros: SAI do saldo
  if (DATA.devolucoes) {
    DATA.devolucoes.forEach(dev => {
      if (dev.data && dev.valor) {
        const d = parseDate(dev.data);
        if (d >= corte) saldo -= dev.valor;
      }
    });
  }
  
  return saldo;
}

function calcCapitalProprioRodando() {
  return DATA.emprestimos
    .filter(e => e.origem === 'Próprio' && getStatus(e) !== 'Pago')
    .reduce((s, e) => s + (e.valor || 0), 0);
}

function calcCapitalTerceiros() {
  return DATA.emprestimos
    .filter(e => e.origem === 'Terceiro' && getStatus(e) !== 'Pago')
    .reduce((s, e) => s + (e.valor || 0), 0);
}

function calcInvestimentos() {
  let aportes = 0, resgates = 0, rendimentos = 0;
  DATA.investimentos.forEach(i => {
    if (i.movimento === 'Aporte') aportes += i.valor || 0;
    else if (i.movimento === 'Resgate') resgates += i.valor || 0;
    else if (i.movimento === 'Rendimento') rendimentos += i.valor || 0;
  });
  return { total: aportes - resgates, rendimentos };
}

function calcPatrimonio() {
  return calcSaldoAtual() + calcCapitalProprioRodando() + calcInvestimentos().total + (calcMetaAcumulada());
}

function calcMetaAcumulada() {
  return (DATA.metas.aportes || []).reduce((s, a) => s + (a.valor || 0), 0);
}

function getStatus(e) {
  if (!e.valor) return '';
  if (e.dataPgto) return 'Pago';
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  const acordada = parseDate(e.dataAcordada);
  if (acordada && hoje > acordada) return 'Atrasado';
  return 'Em aberto';
}

function calcReceitasMes(mes, ano, categoria = null) {
  return DATA.receitas
    .filter(r => {
      if (!r.dataReceb || !r.valor) return false;
      const d = parseDate(r.dataReceb);
      if (d.getMonth()+1 !== mes || d.getFullYear() !== ano) return false;
      if (categoria && r.categoria !== categoria) return false;
      return true;
    })
    .reduce((s, r) => s + r.valor, 0);
}

function calcDespesasPagas(mes, ano, categoria = null, necessario = null) {
  return DATA.despesas
    .filter(d => {
      if (!d.dataPgto || !d.valor) return false;
      const dt = parseDate(d.dataPgto);
      if (dt.getMonth()+1 !== mes || dt.getFullYear() !== ano) return false;
      if (categoria && d.categoria !== categoria) return false;
      if (necessario !== null && d.necessario !== necessario) return false;
      return true;
    })
    .reduce((s, d) => s + d.valor, 0);
}

function calcDespesasPendentes(mes, ano, categoria = null) {
  return DATA.despesas
    .filter(d => {
      if (d.dataPgto || !d.valor || !d.data) return false;
      const dt = parseDate(d.data);
      if (dt.getMonth()+1 !== mes || dt.getFullYear() !== ano) return false;
      if (categoria && d.categoria !== categoria) return false;
      return true;
    })
    .reduce((s, d) => s + d.valor, 0);
}

function render() {
  const tab = document.querySelector('.tab.active').dataset.page;
  const content = document.getElementById('content');
  
  // FAB visibility
  const fab = document.getElementById('fab');
  if (['receitas', 'despesas', 'emprestimos', 'investimentos', 'clientes'].includes(tab)) {
    fab.style.display = 'flex';
  } else if (tab === 'metas') {
    fab.style.display = 'flex';
  } else if (tab === 'devolucoes') {
    fab.style.display = 'flex';
  } else {
    fab.style.display = 'none';
  }
  
  switch (tab) {
    case 'dashboard': content.innerHTML = renderDashboard(); break;
    case 'receitas': content.innerHTML = renderReceitas(); break;
    case 'despesas': content.innerHTML = renderDespesas(); break;
    case 'emprestimos': content.innerHTML = renderEmprestimos(); break;
    case 'clientes': content.innerHTML = renderClientes(); break;
    case 'capitais': content.innerHTML = renderCapitais(); break;
    case 'investimentos': content.innerHTML = renderInvestimentos(); break;
    case 'metas': content.innerHTML = renderMetas(); break;
    case 'patrimonio': content.innerHTML = renderPatrimonio(); break;
    case 'devolucoes': content.innerHTML = renderDevolucoes(); break;
    case 'analise': content.innerHTML = renderAnalise(); break;
    case 'config': content.innerHTML = renderConfig(); break;
  }
  
  // Atualizar nome do usuário no header
  const headerName = document.getElementById('headerUserName');
  if (headerName && DATA.userName) headerName.textContent = DATA.userName;
}

const MESES_NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function periodSelector() {
  return `<div class="period-selector" style="display:flex;gap:6px;align-items:center;margin-bottom:16px">
    <button class="period-btn" onclick="changeMonth(-1)" style="padding:8px 12px;font-size:18px;line-height:1">‹</button>
    <button class="period-btn" onclick="openMonthPicker()" style="flex:1;text-align:center;font-weight:600">📅 ${MESES_NOMES[CURRENT_PERIOD.month-1]} / ${CURRENT_PERIOD.year}</button>
    <button class="period-btn" onclick="changeMonth(1)" style="padding:8px 12px;font-size:18px;line-height:1">›</button>
    <button class="period-btn" onclick="goToCurrentMonth()" title="Ir pro mês atual" style="padding:8px 10px">🎯</button>
  </div>`;
}

function changeMonth(delta) {
  CURRENT_PERIOD.month += delta;
  if (CURRENT_PERIOD.month > 12) { CURRENT_PERIOD.month = 1; CURRENT_PERIOD.year++; }
  if (CURRENT_PERIOD.month < 1) { CURRENT_PERIOD.month = 12; CURRENT_PERIOD.year--; }
  render();
}

function goToCurrentMonth() {
  const now = new Date();
  CURRENT_PERIOD.month = now.getMonth() + 1;
  CURRENT_PERIOD.year = now.getFullYear();
  render();
}

function openMonthPicker() {
  showModal(`
    <div class="modal-title">Escolher período</div>
    <div class="form-group">
      <label class="form-label">Mês</label>
      <select class="form-select" id="picker_month">
        ${MESES_NOMES.map((m, i) => `<option value="${i+1}" ${CURRENT_PERIOD.month === i+1 ? 'selected' : ''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Ano</label>
      <select class="form-select" id="picker_year">
        ${[2024,2025,2026,2027,2028,2029,2030].map(y => `<option value="${y}" ${CURRENT_PERIOD.year === y ? 'selected' : ''}>${y}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="applyMonthPicker()">Aplicar</button>
    </div>
  `);
}

function applyMonthPicker() {
  CURRENT_PERIOD.month = parseInt(document.getElementById('picker_month').value);
  CURRENT_PERIOD.year = parseInt(document.getElementById('picker_year').value);
  closeModal();
  render();
}

function openResumoMes() {
  const m = CURRENT_PERIOD.month, y = CURRENT_PERIOD.year;
  const nome = MESES_NOMES[m-1];
  const saldo = calcSaldoAtual();
  const rec = calcReceitasMes(m, y);
  const dep = calcDespesasPagas(m, y);
  const pend = calcDespesasPendentes(m, y);
  const juros = calcReceitasMes(m, y, 'Juros');
  const necess = calcDespesasPagas(m, y, null, 'Sim');
  const desnec = calcDespesasPagas(m, y, null, 'Não');
  const resultado = rec - dep;
  
  const txt = `📊 RESUMO ${nome.toUpperCase()}/${y}
━━━━━━━━━━━━━━━━━━━

💵 Saldo atual: ${fmt(saldo)}

📈 Receitas: ${fmt(rec)}
   • Juros: ${fmt(juros)}
📉 Despesas pagas: ${fmt(dep)}
⏳ Pendente: ${fmt(pend)}

📊 Resultado: ${fmt(resultado)}
${resultado >= 0 ? '✅ Mês positivo' : '⚠️ Mês negativo'}

✅ Gastos necessários: ${fmt(necess)}
❌ Gastos desnecessários: ${fmt(desnec)}
${(necess+desnec) > 0 ? `📊 % desnecessário: ${((desnec/(necess+desnec))*100).toFixed(1)}%` : ''}

━━━━━━━━━━━━━━━━━━━
Gerado em ${new Date().toLocaleString('pt-BR')}`;

  showModal(`
    <div class="modal-title">📋 Resumo de ${nome}/${y}</div>
    <textarea class="form-textarea" id="resumo_text" style="min-height:300px;font-family:monospace;font-size:12px" readonly>${txt}</textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
      <button class="btn btn-primary" onclick="document.getElementById('resumo_text').select();document.execCommand('copy');showToast('Copiado!')">📋 Copiar</button>
    </div>
  `);
}

function renderEmprestimos() {
  const sorted = [...DATA.emprestimos].sort((a, b) => {
    const sa = getStatus(a), sb = getStatus(b);
    const order = { 'Atrasado': 0, 'Em aberto': 1, 'Pago': 2 };
    if (order[sa] !== order[sb]) return order[sa] - order[sb];
    return (a.dataAcordada || '').localeCompare(b.dataAcordada || '');
  });
  
  if (sorted.length === 0) {
    return `<div class="empty"><div class="empty-icon">🤝</div><div>Nenhum empréstimo</div></div>`;
  }
  
  return `
    <div class="section">
      <div class="section-title">Empréstimos</div>
      ${sorted.map(e => {
        const status = getStatus(e);
        const totalReceber = (e.valor || 0) * (1 + (e.juros || 0));
        const tag = { 'Pago': 'success', 'Atrasado': 'danger', 'Em aberto': 'warning' }[status];
        return `
        <div class="list-item">
          <div onclick="openEmprestimoDetail(${e.id})" style="cursor:pointer">
            <div class="list-item-header">
              <div>
                <div class="list-item-title">${e.nome}</div>
                <div class="list-item-meta">
                  <span class="tag tag-${tag}">${status}</span>
                  <span class="tag tag-${e.origem === 'Próprio' ? 'accent' : 'purple'}">${e.origem}</span>
                  <span>📅 vence ${fmtDate(e.dataAcordada)}</span>
                </div>
              </div>
              <div style="text-align:right">
                <div class="list-item-value">${fmt(totalReceber)}</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${fmt(e.valor)} + ${((e.juros || 0)*100).toFixed(0)}%</div>
              </div>
            </div>
          </div>
          ${status !== 'Pago' ? `
            <div style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
              <button class="btn btn-secondary" style="flex:1;padding:6px 10px;font-size:12px" onclick="event.stopPropagation();markEmprestimoPago(${e.id})">✓ Marcar pago</button>
              <button class="btn btn-secondary" style="flex:1;padding:6px 10px;font-size:12px" onclick="event.stopPropagation();copyMsgCobranca(${e.id})">💬 Mensagem</button>
              <button class="btn btn-secondary" style="padding:6px 10px;font-size:12px" onclick="event.stopPropagation();editEmprestimo(${e.id})">✏️</button>
            </div>
          ` : ''}
        </div>
      `}).join('')}
    </div>
  `;
}

function markEmprestimoPago(id) {
  const e = DATA.emprestimos.find(x => x.id === id);
  if (!e) return;
  if (!confirm(`Marcar empréstimo de ${e.nome} (${fmt(e.valor)}) como pago HOJE?`)) return;
  e.dataPgto = todayISO();
  saveData();
  render();
  showToast('Empréstimo marcado como pago ✓');
}

function copyMsgCobranca(id) {
  const e = DATA.emprestimos.find(x => x.id === id);
  if (!e) return;
  const total = (e.valor || 0) * (1 + (e.juros || 0));
  let msg = DATA.msgCobranca || 'Oi {nome}, hoje vence o pagamento de R$ {valor}. Pode confirmar?';
  msg = msg.replace(/{nome}/g, e.nome.split(' ')[0])
           .replace(/{valor}/g, total.toFixed(2).replace('.', ','))
           .replace(/{capital}/g, (e.valor || 0).toFixed(2).replace('.', ','))
           .replace(/{juros}/g, ((e.valor || 0) * (e.juros || 0)).toFixed(2).replace('.', ','))
           .replace(/{vencimento}/g, fmtDate(e.dataAcordada));
  
  navigator.clipboard.writeText(msg).then(() => {
    showToast('Mensagem copiada! Cole no WhatsApp');
  }).catch(() => {
    // Fallback: mostrar num modal pra copiar manual
    showModal(`
      <div class="modal-title">💬 Mensagem de cobrança</div>
      <div class="form-group">
        <textarea class="form-textarea" id="msg_copy" style="min-height:120px" readonly>${msg}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
        <button class="btn btn-primary" onclick="document.getElementById('msg_copy').select();document.execCommand('copy');showToast('Copiado!');closeModal()">Copiar</button>
      </div>
    `);
  });
}

function openEmprestimoDetail(id) {
  const e = DATA.emprestimos.find(x => x.id === id);
  if (!e) return;
  const status = getStatus(e);
  const tag = { 'Pago': 'success', 'Atrasado': 'danger', 'Em aberto': 'warning' }[status];
  const total = (e.valor || 0) * (1 + (e.juros || 0));
  const lucro = (e.valor || 0) * (e.juros || 0);
  
  // Dias até vencer ou em atraso
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const venc = parseDate(e.dataAcordada);
  let diasInfo = '';
  if (status === 'Pago') {
    diasInfo = `Pago em ${fmtDate(e.dataPgto)}`;
  } else if (venc) {
    const diff = Math.floor((venc - hoje) / (1000*60*60*24));
    if (diff < 0) diasInfo = `<span style="color:var(--danger)">${Math.abs(diff)} dias em atraso</span>`;
    else if (diff === 0) diasInfo = `<span style="color:var(--warning)">Vence HOJE</span>`;
    else diasInfo = `Vence em ${diff} dias`;
  }
  
  showModal(`
    <div class="modal-title">📄 Detalhes do empréstimo</div>
    
    <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);margin-bottom:12px">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">${e.nome}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span class="tag tag-${tag}">${status}</span>
        <span class="tag tag-${e.origem === 'Próprio' ? 'accent' : 'purple'}">${e.origem}</span>
      </div>
      ${e.contato ? `<div style="font-size:12px;color:var(--text-muted)">📱 ${e.contato}</div>` : ''}
    </div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Capital</div>
        <div style="font-weight:700;font-size:16px">${fmt(e.valor)}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Juros (${((e.juros || 0)*100).toFixed(0)}%)</div>
        <div style="font-weight:700;font-size:16px;color:var(--success)">${fmt(lucro)}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Total a receber</div>
        <div style="font-weight:700;font-size:16px;color:var(--accent)">${fmt(total)}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Status</div>
        <div style="font-weight:700;font-size:13px">${diasInfo}</div>
      </div>
    </div>
    
    <div style="background:var(--bg);padding:10px;border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="color:var(--text-muted)">Emprestei em:</span>
        <span>${fmtDate(e.dataEmp)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="color:var(--text-muted)">Acordado pra:</span>
        <span>${fmtDate(e.dataAcordada)}</span>
      </div>
      ${e.donoTerceiro ? `<div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Capital de:</span><span>${e.donoTerceiro}</span></div>` : ''}
      ${e.obs ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--text-secondary);font-size:12px;font-style:italic">${e.obs}</div>` : ''}
    </div>
    
    <div class="modal-actions">
      ${status !== 'Pago' ? `<button class="btn btn-primary" onclick="closeModal();markEmprestimoPago(${id})">✓ Marcar pago</button>` : ''}
      <button class="btn btn-secondary" onclick="closeModal();copyMsgCobranca(${id})">💬 Mensagem</button>
      <button class="btn btn-secondary" onclick="closeModal();editEmprestimo(${id})">✏️ Editar</button>
    </div>
  `);
}

function renderClientes() {
  if (!DATA.clientes) DATA.clientes = [];
  
  // Auto-cadastrar clientes a partir dos empréstimos
  autoSyncClientes();
  
  // Calcular stats por cliente
  const stats = {};
  DATA.clientes.forEach(c => {
    stats[c.id] = {
      total: 0,
      pago: 0,
      emAberto: 0,
      jurosGanhos: 0,
      jurosAReceber: 0,
      qtdEmp: 0,
      atrasados: 0,
    };
  });
  
  DATA.emprestimos.forEach(e => {
    const cli = DATA.clientes.find(c => c.nome === e.nome);
    if (!cli) return;
    const s = stats[cli.id];
    s.total += e.valor || 0;
    s.qtdEmp++;
    const st = getStatus(e);
    if (st === 'Pago') {
      s.pago += e.valor || 0;
      s.jurosGanhos += (e.valor || 0) * (e.juros || 0);
    } else {
      s.emAberto += e.valor || 0;
      s.jurosAReceber += (e.valor || 0) * (e.juros || 0);
      if (st === 'Atrasado') s.atrasados++;
    }
  });
  
  if (DATA.clientes.length === 0) {
    return `<div class="empty"><div class="empty-icon">👥</div><div>Nenhum cliente cadastrado</div><div style="margin-top:8px;font-size:13px">Toque no + pra adicionar</div></div>`;
  }
  
  // Ordenar por valor total emprestado
  const sorted = [...DATA.clientes].sort((a, b) => (stats[b.id]?.total || 0) - (stats[a.id]?.total || 0));
  
  return `
    <div class="section">
      <div class="section-title">
        <span>Clientes</span>
        <span style="color:var(--text-muted);font-size:12px;font-weight:normal">${DATA.clientes.length} cadastrados</span>
      </div>
      ${sorted.map(c => {
        const s = stats[c.id];

function autoSyncClientes() {
  if (!DATA.clientes) DATA.clientes = [];
  const nomesExistentes = new Set(DATA.clientes.map(c => c.nome));
  DATA.emprestimos.forEach(e => {
    if (!nomesExistentes.has(e.nome)) {
      DATA.clientes.push({
        id: nextId(DATA.clientes),
        nome: e.nome,
        contato: e.contato || '',
        obs: ''
      });
      nomesExistentes.add(e.nome);
    }
  });
  saveData();
}

function openClienteModal(id) {
  const c = id ? DATA.clientes.find(x => x.id === id) : { nome: '', contato: '', obs: '' };
  const isEdit = !!id;
  
  showModal(`
    <div class="modal-title">${isEdit ? '✏️ Editar' : '➕ Novo'} Cliente</div>
    <div class="form-group">
      <label class="form-label">Nome *</label>
      <input class="form-input" type="text" id="c_nome" value="${c.nome || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Contato (WhatsApp)</label>
      <input class="form-input" type="tel" id="c_contato" value="${c.contato || ''}" inputmode="tel">
    </div>
    <div class="form-group">
      <label class="form-label">Observações</label>
      <input class="form-input" type="text" id="c_obs" value="${c.obs || ''}">
    </div>
    <div class="modal-actions">
      ${isEdit ? `<button class="btn btn-danger" onclick="deleteCliente(${id})">Excluir</button>` : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente(${isEdit ? id : 'null'})">Salvar</button>
    </div>
  `);
}

function saveCliente(id) {
  const nome = document.getElementById('c_nome').value.trim();
  if (!nome) { showToast('Nome obrigatório'); return; }
  
  const data = {
    nome,
    contato: document.getElementById('c_contato').value,
    obs: document.getElementById('c_obs').value,
  };
  
  const nomeAntigo = id ? DATA.clientes.find(x => x.id === id)?.nome : null;
  
  if (id) {
    const idx = DATA.clientes.findIndex(x => x.id === id);
    if (idx >= 0) DATA.clientes[idx] = { ...DATA.clientes[idx], ...data };
    // Se mudou o nome, atualizar empréstimos
    if (nomeAntigo && nomeAntigo !== nome) {
      DATA.emprestimos.forEach(e => {
        if (e.nome === nomeAntigo) {
          e.nome = nome;
          e.contato = data.contato;
        }
      });
    }
  } else {
    DATA.clientes.push({ id: nextId(DATA.clientes), ...data });
  }
  
  saveData();
  closeModal();
  render();
  showToast(id ? 'Cliente atualizado' : 'Cliente adicionado');
}

function deleteCliente(id) {
  const c = DATA.clientes.find(x => x.id === id);
  if (!c) return;
  const empCount = DATA.emprestimos.filter(e => e.nome === c.nome).length;
  if (empCount > 0) {
    if (!confirm(`Esse cliente tem ${empCount} empréstimo(s) vinculado(s). Excluir mesmo? (empréstimos serão mantidos com o nome)`)) return;
  } else {
    if (!confirm(`Excluir cliente "${c.nome}"?`)) return;
  }
  DATA.clientes = DATA.clientes.filter(x => x.id !== id);
  saveData();
  closeModal();
  render();
  showToast('Cliente excluído');
}

    return { mes, rec, desp, resultado: rec - desp, juros };

    rec: dados.reduce((s,d) => s + d.rec, 0),
    desp: dados.reduce((s,d) => s + d.desp, 0),

    juros: dados.reduce((s,d) => s + d.juros, 0),

  const maxVal = Math.max(...dados.map(d => Math.max(d.rec, d.desp)), 100);

function renderClientesChart(clientes, maxVal) {
  // Gráfico horizontal de barras duplas (capital + juros)
  const W = 320, barH = 28, gap = 16, headerH = 4, footerH = 4;
  const H = clientes.length * (barH * 2 + gap) + headerH + footerH;
  
  let bars = '';
  let labels = '';
  let y = headerH;
  
  clientes.forEach((c) => {
    const wCap = maxVal > 0 ? (c.capital / maxVal) * (W - 100) : 0;
    const wJur = maxVal > 0 ? (c.juros / maxVal) * (W - 100) : 0;
    const labelX = 4;
    const barX = 88;
    
    // Label do cliente
    labels += `<text class="chart-label" x="${labelX}" y="${y + barH/2 + 4}" style="font-weight:600;font-size:11px;fill:var(--text)">${c.nome.split(' ')[0].substring(0,10)}</text>`;
    
    // Barra capital
    bars += `<rect x="${barX}" y="${y}" width="${wCap}" height="${barH - 4}" fill="var(--accent)" rx="2"></rect>`;
    bars += `<text class="chart-label" x="${barX + wCap + 4}" y="${y + (barH-4)/2 + 4}" style="font-size:10px;fill:var(--text-secondary)">${fmtShort(c.capital)}</text>`;
    
    // Barra juros (logo abaixo)
    bars += `<rect x="${barX}" y="${y + barH}" width="${wJur}" height="${barH - 4}" fill="var(--success)" rx="2"></rect>`;
    bars += `<text class="chart-label" x="${barX + wJur + 4}" y="${y + barH + (barH-4)/2 + 4}" style="font-size:10px;fill:var(--text-secondary)">${fmtShort(c.juros)}</text>`;
    
    y += barH * 2 + gap;
  });
  
  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="min-width:300px">
      ${labels}
      ${bars}
    </svg>
  </div>`;
}

function fmtShort(n) {
  if (n === 0) return 'R$ 0';
  if (n >= 1000) return 'R$ ' + (n/1000).toFixed(1).replace('.', ',') + 'k';
  return 'R$ ' + n.toFixed(0);
}

function renderBarChart(data, colors, maxVal) {
  const W = 320, H = 180;
  const barGroupWidth = (W - 20) / data.length;
  const numSeries = data[0].values.length;
  const barWidth = (barGroupWidth - 4) / numSeries;
  
  let bars = '';
  data.forEach((d, i) => {
    d.values.forEach((v, j) => {
      const h = maxVal > 0 ? (v / maxVal) * (H - 30) : 0;
      const x = 10 + i * barGroupWidth + j * barWidth + 1;
      const y = H - 20 - h;
      bars += `<rect class="chart-bar" x="${x}" y="${y}" width="${barWidth - 2}" height="${h}" fill="${colors[j]}" rx="2"></rect>`;
    });
    bars += `<text class="chart-label" x="${10 + i * barGroupWidth + barGroupWidth/2}" y="${H - 5}" text-anchor="middle">${d.label}</text>`;
  });
  
  return `<div class="chart-container">
    <svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <line class="chart-grid" x1="10" y1="${H-20}" x2="${W-10}" y2="${H-20}"></line>
      ${bars}
    </svg>
  </div>`;
}

function renderDevolucoes() {
  if (!DATA.devolucoes) DATA.devolucoes = [];
  if (!DATA.donosTerceiros) DATA.donosTerceiros = ['Pai', 'Santander Pix Crédito'];
  
  // Calcular saldo por dono
  const saldosPorDono = {};
  DATA.donosTerceiros.forEach(dono => {
    saldosPorDono[dono] = {
      capitalEmAberto: 0,    // capital ainda na mão dos clientes (terceiro)
      capitalRecebido: 0,    // cliente já pagou, dinheiro na minha conta
      jaDevolvido: 0,        // já devolvi pro dono
      jurosRecebidos: 0,     // juros já recebidos desse dono
      jurosAReceber: 0,      // juros a receber (em aberto)
      qtdEmprestimos: 0,
    };
  });
  
  DATA.emprestimos.forEach(e => {
    if (e.origem !== 'Terceiro') return;
    const dono = e.donoTerceiro || 'Pai';
    if (!saldosPorDono[dono]) {
      saldosPorDono[dono] = { capitalEmAberto:0, capitalRecebido:0, jaDevolvido:0, jurosRecebidos:0, jurosAReceber:0, qtdEmprestimos:0 };
    }
    saldosPorDono[dono].qtdEmprestimos++;
    
    const status = getStatus(e);
    if (status === 'Pago') {
      saldosPorDono[dono].capitalRecebido += e.valor || 0;
      saldosPorDono[dono].jurosRecebidos += (e.valor || 0) * (e.juros || 0);
    } else {
      saldosPorDono[dono].capitalEmAberto += e.valor || 0;
      saldosPorDono[dono].jurosAReceber += (e.valor || 0) * (e.juros || 0);
    }
  });
  
  DATA.devolucoes.forEach(d => {
    if (saldosPorDono[d.dono]) saldosPorDono[d.dono].jaDevolvido += d.valor || 0;
  });
  
  let totalUrgente = 0;     // já voltou pra mim, devolver agora
  let totalFuturo = 0;       // ainda tá com clientes, vai voltar
  Object.keys(saldosPorDono).forEach(dono => {
    const s = saldosPorDono[dono];
    s.pendenteUrgente = s.capitalRecebido - s.jaDevolvido;
    s.pendenteFuturo = s.capitalEmAberto;
    s.totalPendente = s.pendenteUrgente + s.pendenteFuturo;
    if (s.pendenteUrgente > 0.01) totalUrgente += s.pendenteUrgente;
    totalFuturo += s.pendenteFuturo;
  });
  
  return `
    ${totalUrgente > 0.01 ? `
      <div class="section" style="border-color:var(--danger);background:rgba(248,113,113,0.05)">
        <div class="section-title" style="color:var(--danger)">⚠️ Devolver AGORA</div>
        <div style="font-size:24px;font-weight:700;color:var(--danger);margin-bottom:4px">${fmt(totalUrgente)}</div>
        <div style="font-size:12px;color:var(--text-secondary)">Esse dinheiro já voltou pra sua conta — devolva o quanto antes pro dono</div>
      </div>
    ` : ''}
    
    ${totalFuturo > 0.01 ? `
      <div class="section" style="border-color:var(--warning);background:rgba(251,191,36,0.05)">
        <div class="section-title" style="color:var(--warning)">📊 Total que vai voltar</div>
        <div style="font-size:24px;font-weight:700;color:var(--warning);margin-bottom:4px">${fmt(totalFuturo)}</div>
        <div style="font-size:12px;color:var(--text-secondary)">Ainda tá com os clientes. Quando voltar, devolve pro dono.</div>
      </div>
    ` : ''}
    
    ${totalUrgente < 0.01 && totalFuturo < 0.01 ? `
      <div class="section" style="background:rgba(52,211,153,0.05);border-color:var(--success)">
        <div style="text-align:center;padding:8px;color:var(--success);font-weight:600">✓ Nenhuma devolução pendente</div>
      </div>
    ` : ''}
    
    ${Object.keys(saldosPorDono).map(dono => {
      const s = saldosPorDono[dono];
      const corUrg = s.pendenteUrgente > 0.01 ? 'var(--danger)' : 'var(--text-muted)';
      const safeName = dono.replace(/'/g, "\\'");
      return `
        <div class="section">
          <div class="section-title">
            <span>👤 ${dono}</span>
            <div style="display:flex;gap:6px">
              <button class="icon-btn" onclick="editDonoTerceiro('${safeName}')" title="Editar">✏️</button>
              <button class="icon-btn" onclick="deleteDonoTerceiro('${safeName}')" title="Excluir">🗑️</button>
              <button class="icon-btn" onclick="openDevolucaoModal(null, '${safeName}')">+ Devolver</button>
            </div>
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">🟡 Em aberto</div>
              <div style="font-weight:600">${fmt(s.capitalEmAberto)}</div>
              <div style="font-size:10px;color:var(--text-muted)">com clientes</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">📥 Já recebido</div>
              <div style="font-weight:600">${fmt(s.capitalRecebido)}</div>
              <div style="font-size:10px;color:var(--text-muted)">na sua conta</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">✓ Já devolvido</div>
              <div style="color:var(--success);font-weight:600">${fmt(s.jaDevolvido)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">🔴 Devolver agora</div>
              <div style="color:${corUrg};font-weight:700;font-size:16px">${fmt(s.pendenteUrgente)}</div>
            </div>
          </div>
          
          <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">💰 Juros recebidos</div>
              <div style="color:var(--success);font-weight:600">${fmt(s.jurosRecebidos)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">⏳ Juros a receber</div>
              <div style="color:var(--success);font-weight:600">${fmt(s.jurosAReceber)}</div>
            </div>
          </div>
          
          <div style="margin-top:8px;font-size:11px;color:var(--text-muted)">${s.qtdEmprestimos} empréstimo${s.qtdEmprestimos !== 1 ? 's' : ''}</div>
        </div>
      `;
    }).join('')}
    
    <div class="section">
      <div class="section-title">📋 Histórico de devoluções</div>
      ${DATA.devolucoes.length === 0 ? `
        <div style="text-align:center;padding:20px;color:var(--text-muted)">Nenhuma devolução ainda</div>
      ` : [...DATA.devolucoes].sort((a,b) => (b.data||'').localeCompare(a.data||'')).map(d => `
        <div class="list-item" onclick="openDevolucaoModal(${d.id})">
          <div class="list-item-header">
            <div>
              <div class="list-item-title">${d.dono}</div>
              <div class="list-item-meta">
                <span>📅 ${fmtDate(d.data)}</span>
                ${d.obs ? `<span>${d.obs}</span>` : ''}
              </div>
            </div>
            <div class="list-item-value" style="color:var(--danger)">- ${fmt(d.valor)}</div>
          </div>
        </div>
      `).join('')}
    </div>
    
    <div class="section">
      <div class="section-title">⚙️ Donos cadastrados</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        ${DATA.donosTerceiros.map(d => `<span class="tag tag-purple">${d}</span>`).join('')}
      </div>
      <button class="btn btn-secondary" onclick="addDonoTerceiro()" style="width:100%">+ Adicionar dono</button>
    </div>
  `;
}

function addDonoTerceiro() {
  const nome = prompt('Nome do dono do capital (ex: Pai, João, Empresa X):');
  if (!nome || !nome.trim()) return;
  if (!DATA.donosTerceiros) DATA.donosTerceiros = [];
  if (DATA.donosTerceiros.includes(nome.trim())) {
    showToast('Esse dono já existe');
    return;
  }
  DATA.donosTerceiros.push(nome.trim());
  saveData();
  render();
  showToast('Dono adicionado: ' + nome);
}

function editDonoTerceiro(nomeAtual) {
  const novoNome = prompt('Novo nome:', nomeAtual);
  if (!novoNome || !novoNome.trim() || novoNome.trim() === nomeAtual) return;
  const novo = novoNome.trim();
  if (DATA.donosTerceiros.includes(novo)) {
    showToast('Já existe um dono com esse nome');
    return;
  }
  // Renomear no array de donos
  const idx = DATA.donosTerceiros.indexOf(nomeAtual);
  if (idx >= 0) DATA.donosTerceiros[idx] = novo;
  // Renomear nos empréstimos
  DATA.emprestimos.forEach(e => {
    if (e.donoTerceiro === nomeAtual) e.donoTerceiro = novo;
  });
  // Renomear nas devoluções
  DATA.devolucoes.forEach(d => {
    if (d.dono === nomeAtual) d.dono = novo;
  });
  saveData();
  render();
  showToast('Dono renomeado');
}

function deleteDonoTerceiro(nome) {
  // Verificar se tem empréstimos vinculados
  const vinculados = DATA.emprestimos.filter(e => e.donoTerceiro === nome).length;
  const devs = DATA.devolucoes.filter(d => d.dono === nome).length;
  if (vinculados > 0 || devs > 0) {
    if (!confirm(`Esse dono tem ${vinculados} empréstimo(s) e ${devs} devolução(ões) vinculadas. Excluir mesmo assim? (os registros serão mantidos com o nome)`)) return;
  } else {
    if (!confirm(`Excluir o dono "${nome}"?`)) return;
  }
  DATA.donosTerceiros = DATA.donosTerceiros.filter(d => d !== nome);
  saveData();
  render();
  showToast('Dono excluído');
}

function openDevolucaoModal(id, donoSugerido) {
  const d = id ? DATA.devolucoes.find(x => x.id === id) : {
    data: todayISO(),
    dono: donoSugerido || (DATA.donosTerceiros[0] || 'Pai'),
    valor: '',
    obs: ''
  };
  const isEdit = !!id;
  
  showModal(`
    <div class="modal-title">${isEdit ? '✏️ Editar' : '➕ Nova'} Devolução</div>
    <div class="form-group">
      <label class="form-label">Data</label>
      <input class="form-input" type="date" id="dv_data" value="${d.data || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Dono do capital</label>
      <select class="form-select" id="dv_dono">
        ${DATA.donosTerceiros.map(dn => `<option value="${dn}" ${d.dono === dn ? 'selected' : ''}>${dn}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Valor devolvido (R$)</label>
      <input class="form-input" type="number" step="0.01" id="dv_valor" value="${d.valor !== null && d.valor !== undefined ? d.valor : ''}" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label">Observação</label>
      <input class="form-input" type="text" id="dv_obs" value="${d.obs || ''}">
    </div>
    <div class="modal-actions">
      ${isEdit ? `<button class="btn btn-danger" onclick="deleteDevolucao(${id})">Excluir</button>` : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDevolucao(${isEdit ? id : 'null'})">Salvar</button>
    </div>
  `);
}

function saveDevolucao(id) {
  const data = {
    data: document.getElementById('dv_data').value || null,
    dono: document.getElementById('dv_dono').value,
    valor: parseFloat(document.getElementById('dv_valor').value) || 0,
    obs: document.getElementById('dv_obs').value,
  };
  if (id) {
    const idx = DATA.devolucoes.findIndex(x => x.id === id);
    if (idx >= 0) DATA.devolucoes[idx] = { ...DATA.devolucoes[idx], ...data };
  } else {
    DATA.devolucoes.push({ id: nextId(DATA.devolucoes), ...data });
  }
  saveData();
  closeModal();
  render();
  showToast(id ? 'Devolução atualizada' : 'Devolução registrada');
}

function deleteDevolucao(id) {
  if (!confirm('Excluir essa devolução?')) return;
  DATA.devolucoes = DATA.devolucoes.filter(d => d.id !== id);
  saveData();
  closeModal();
  render();
  showToast('Devolução excluída');
}

function addConta() {
  const nome = prompt('Nome da conta (ex: Nubank, Inter, Itaú):');
  if (!nome || !nome.trim()) return;
  if (!DATA.contas) DATA.contas = [];
  if (DATA.contas.includes(nome.trim())) { showToast('Já existe'); return; }
  DATA.contas.push(nome.trim());
  saveData();
  render();
  showToast('Conta adicionada');
}

function removeConta(nome) {
  if (!confirm(`Remover conta "${nome}"?`)) return;
  DATA.contas = DATA.contas.filter(c => c !== nome);
  // Limpar referência nos lançamentos (opcional, mas seguro)

}

function trocarPin() {
  showModal(`
    <div class="modal-title">🔐 Trocar PIN</div>
    <div class="form-group">
      <label class="form-label">PIN atual</label>
      <input class="form-input" type="password" id="pin_old" inputmode="numeric" maxlength="8" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Novo PIN (4 a 8 dígitos)</label>
      <input class="form-input" type="password" id="pin_new" inputmode="numeric" maxlength="8" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar novo PIN</label>
      <input class="form-input" type="password" id="pin_new2" inputmode="numeric" maxlength="8" autocomplete="off">
    </div>
    <div id="pin_err" style="color:var(--danger);font-size:13px;margin-bottom:8px;height:18px"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmTrocarPin()">Trocar PIN</button>
    </div>
  `);
}

function confirmTrocarPin() {
  const old = document.getElementById('pin_old').value;
  const novo = document.getElementById('pin_new').value;
  const novo2 = document.getElementById('pin_new2').value;
  const err = document.getElementById('pin_err');
  
  if (simpleHash(old) !== DATA.pin) { err.textContent = 'PIN atual incorreto'; return; }
  if (novo.length < 4 || novo.length > 8) { err.textContent = 'Novo PIN deve ter 4 a 8 dígitos'; return; }
  if (!/^\d+$/.test(novo)) { err.textContent = 'PIN deve ser só números'; return; }
  if (novo !== novo2) { err.textContent = 'Confirmação não confere'; return; }
  
  DATA.pin = simpleHash(novo);
  saveData();
  closeModal();
  showToast('PIN alterado com sucesso');
}

function exportData() {
  DATA.lastBackup = todayISO();
  saveData();
  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `financas_vinicius_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Dados exportados!');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.config || !imported.receitas) {
        showToast('Arquivo inválido');
        return;
      }
      if (!confirm('Isso vai SUBSTITUIR todos os dados atuais. Continuar?')) {
        return;
      }
      DATA = imported;
      saveData();
      render();
      showToast('Dados importados com sucesso!');
    } catch (err) {
      showToast('Erro ao importar: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset input
}

function resetData() {
  if (!confirm('Tem certeza? Isso vai APAGAR TUDO e começar do zero.')) return;
  if (!confirm('Última chance! Confirma apagar tudo?')) return;
  DATA = {
    config: { saldoInicial: 0, dataCorte: todayISO() },
    receitas: [],
    despesas: [],
    emprestimos: [],
    investimentos: [],
    metas: { valorMeta: 0, aportes: [] }
  };
  saveData();
  render();
  showToast('Tudo apagado!');
}

// TOAST
// ============================================================
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
// TAB NAV
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('content').scrollTop = 0;
    render();
  });
});

// ============================================================
// LOCK SCREEN (PIN)
// ============================================================
const lockScreen = document.getElementById('lockScreen');
const pinDisplay = document.getElementById('pinDisplay');
const lockError = document.getElementById('lockError');
const lockTitle = document.getElementById('lockTitle');
const lockSubtitle = document.getElementById('lockSubtitle');
const lockImportBtn = document.getElementById('lockImportBtn');

let pinAtual = '';
let pinModo = 'criar'; // 'criar' | 'confirmar' | 'verificar'
let pinCriacao = ''; // armazena pin durante criação
let pinTentativas = 0;

function initLockScreen() {
  if (!DATA.pin) {
    // Primeira vez - criar PIN
    pinModo = 'criar';
    lockTitle.textContent = 'Bem-vindo, Vinicius';
    lockSubtitle.textContent = 'Crie um PIN de 4 a 8 dígitos para proteger seus dados';
    lockImportBtn.style.display = 'block';
  } else {
    // Verificar PIN
    pinModo = 'verificar';
    lockTitle.textContent = 'Digite seu PIN';
    lockSubtitle.textContent = '';
    lockImportBtn.style.display = 'none';
  }
}

function updatePinDisplay() {
  pinDisplay.textContent = '•'.repeat(pinAtual.length);
}

function clearPin() {
  pinAtual = '';
  updatePinDisplay();
  lockError.textContent = '';
}

function confirmPin() {
  if (pinAtual.length < 4) {
    showLockError('Mínimo 4 dígitos');
    return;
  }
  
  if (pinModo === 'criar') {
    pinCriacao = pinAtual;
    pinAtual = '';
    pinModo = 'confirmar';
    lockTitle.textContent = 'Confirme o PIN';
    lockSubtitle.textContent = 'Digite o mesmo PIN novamente';
    updatePinDisplay();
    lockError.textContent = '';
    lockImportBtn.style.display = 'none';
  } else if (pinModo === 'confirmar') {
    if (pinAtual === pinCriacao) {
      // Salvar PIN e desbloquear
      DATA.pin = simpleHash(pinAtual);
      saveData();
      unlock();
    } else {
      showLockError('PIN não confere. Tente de novo.');
      setTimeout(() => {
        pinAtual = '';
        pinCriacao = '';
        pinModo = 'criar';
        lockTitle.textContent = 'Crie seu PIN';
        lockSubtitle.textContent = 'Digite um PIN de 4 a 8 dígitos';
        updatePinDisplay();
        lockError.textContent = '';
      }, 1500);
    }
  } else if (pinModo === 'verificar') {
    if (simpleHash(pinAtual) === DATA.pin) {
      unlock();
    } else {
      pinTentativas++;
      showLockError('PIN incorreto' + (pinTentativas >= 3 ? ' (' + pinTentativas + ' tentativas)' : ''));
      pinAtual = '';
      updatePinDisplay();
    }
  }
}

function unlock() {
  lockScreen.style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('fab').style.display = 'flex';
  render();
  setTimeout(checkBackupReminder, 1500);
}

function checkBackupReminder() {
  if (!DATA.lastBackup) return;
  const last = parseDate(DATA.lastBackup);
  if (!last) return;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diffDays = Math.floor((hoje - last) / (1000*60*60*24));
  if (diffDays >= 7) {
    showToast(`💾 Faz ${diffDays} dias sem backup. Considere exportar.`);
  }
}

function showLockError(msg) {
  lockError.textContent = msg;
  pinDisplay.classList.add('shake');
  setTimeout(() => pinDisplay.classList.remove('shake'), 300);
}

function simpleHash(str) {
  // Hash simples (não criptograficamente seguro, mas suficiente pra esconder do localStorage)
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  // Salt fixo pra dificultar
  return 'pin_' + h + '_' + str.length;
}

// Botões do PIN
document.querySelectorAll('.pin-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    if (key === 'clear') {
      pinAtual = pinAtual.slice(0, -1);
      updatePinDisplay();
      lockError.textContent = '';
    } else if (key === 'ok') {
      confirmPin();
    } else {
      if (pinAtual.length < 8) {
        pinAtual += key;
        updatePinDisplay();
        lockError.textContent = '';
      }
    }
  });
});

// Suporte a teclado físico no PC
document.addEventListener('keydown', (e) => {
  if (lockScreen.style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') {
    if (pinAtual.length < 8) {
      pinAtual += e.key;
      updatePinDisplay();
      lockError.textContent = '';
    }
  } else if (e.key === 'Backspace') {
    pinAtual = pinAtual.slice(0, -1);
    updatePinDisplay();
    lockError.textContent = '';
  } else if (e.key === 'Enter') {
    confirmPin();
  }
});

// Importar dados na tela de bloqueio (pra quando você quer restaurar backup)
const lockImportFile = document.getElementById('lockImportFile');
lockImportBtn.addEventListener('click', () => lockImportFile.click());
lockImportFile.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.config || !imported.receitas) {
        showLockError('Arquivo inválido');
        return;
      }
      DATA = imported;
      // Garante que estruturas novas existam
      if (!DATA.devolucoes) DATA.devolucoes = [];
      if (!DATA.donosTerceiros) DATA.donosTerceiros = ['Pai'];
      saveData();
      // Re-iniciar tela de bloqueio (pode ter PIN agora)
      initLockScreen();
      pinAtual = '';
      updatePinDisplay();
    } catch (err) {
      showLockError('Erro ao importar');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
});

initLockScreen();
updatePinDisplay();

// FAB começa escondido (até desbloquear)
document.getElementById('fab').style.display = 'none';

// ============================================================
// INIT
// ============================================================
// render() é chamado em unlock()

// ESC fecha modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Service Worker pra funcionar offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
